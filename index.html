<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Predictor</title>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Space Mono"', 'monospace'],
                    },
                    colors: {
                        neutral: {
                            900: '#171717',
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Brutalist Focus States & Utility classes */
        ::selection {
            background-color: white;
            color: black;
        }
        input, select {
            color-scheme: dark;
        }
        input:focus {
            outline: 2px solid white;
            outline-offset: -2px;
            box-shadow: none;
        }
        /* Remove arrows from number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-neutral-950 text-white font-mono min-h-screen flex items-center justify-center p-6 selection:bg-white selection:text-black">

    <div class="w-full max-w-xl mx-auto space-y-12">
        <!-- Header -->
        <header class="space-y-4">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight uppercase tracking-widest border-b-2 border-white pb-4">
                Personality<br/>Predictor
            </h1>
            <p class="text-neutral-400 text-sm md:text-base uppercase tracking-wider">
                System Version 1.0.0 // ML Inference
            </p>
        </header>

        <!-- Form Architecture -->
        <form id="prediction-form" class="space-y-6 block">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data Inputs -->
                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Time Spent Alone (h)</label>
                    <input type="number" id="Time_spent_Alone" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="0.0">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Stage Fear (1-10)</label>
                    <input type="number" id="Stage_fear" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="5.0">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Social Event Attendance</label>
                    <input type="number" id="Social_event_attendance" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="2.0">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Going Outside (freq)</label>
                    <input type="number" id="Going_outside" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="4.0">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Drained AFTR Socializing (1-10)</label>
                    <input type="number" id="Drained_after_socializing" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="8.0">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Friends Circle Size</label>
                    <input type="number" id="Friends_circle_size" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="3.0">
                </div>

                <div class="space-y-2 md:col-span-2">
                    <label class="block text-sm uppercase tracking-widest text-neutral-300">Post Frequency</label>
                    <input type="number" id="Post_frequency" step="any" required
                        class="w-full bg-transparent border border-neutral-700 px-4 py-3 text-white placeholder-neutral-600 transition-colors focus:border-white hover:border-neutral-500 rounded-none" 
                        placeholder="1.0">
                </div>
            </div>

            <!-- Submit Button (Brutalist style) -->
            <button type="submit" id="submit-btn" 
                class="w-full bg-white text-black font-bold uppercase tracking-widest py-4 mt-8 hover:bg-neutral-300 hover:scale-[0.99] active:scale-[0.97] transition-all duration-150 rounded-none">
                [ Execute Analysis ]
            </button>
        </form>

        <!-- Result Container (Hidden initially) -->
        <div id="result-container" class="hidden mt-8 p-6 border-2 border-white bg-neutral-900 shadow-[8px_8px_0px_white] transition-opacity duration-300 opacity-0 relative">
            <h3 class="text-neutral-400 text-xs uppercase tracking-widest mb-2 border-b border-neutral-700 pb-2">Analysis Result</h3>
            <p id="result-text" class="text-xl md:text-2xl font-bold uppercase leading-snug break-words">
                <!-- Result string will be injected here -->
            </p>
            <div class="absolute top-2 right-2 w-2 h-2 bg-white rounded-full animate-pulse"></div>
        </div>

    </div>

    <!-- Interface Logic -->
    <script>
        // -----------------------------------------------------------------------
        // CONFIGURATION
        // Set this to the URL of your deployed backend server before deploying.
        // Example: const API_URL = "https://api.your-domain.com/predict";
        // -----------------------------------------------------------------------
        const API_URL = "https://apiproject-backend.onrender.com/predict";

        const form = document.getElementById('prediction-form');
        const submitBtn = document.getElementById('submit-btn');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Enter Loading State
            submitBtn.disabled = true;
            submitBtn.textContent = "[ processing... ]";
            submitBtn.classList.add("bg-neutral-800", "text-neutral-400");
            submitBtn.classList.remove("bg-white", "text-black", "hover:bg-neutral-300");
            
            // Hide previous result
            resultContainer.classList.add("hidden", "opacity-0");
            resultText.classList.remove("text-red-500");

            // 2. Build payload matching the FastAPI PersonalityNote schema
            const payload = {
                Time_spent_Alone: parseFloat(document.getElementById('Time_spent_Alone').value),
                Stage_fear: parseFloat(document.getElementById('Stage_fear').value),
                Social_event_attendance: parseFloat(document.getElementById('Social_event_attendance').value),
                Going_outside: parseFloat(document.getElementById('Going_outside').value),
                Drained_after_socializing: parseFloat(document.getElementById('Drained_after_socializing').value),
                Friends_circle_size: parseFloat(document.getElementById('Friends_circle_size').value),
                Post_frequency: parseFloat(document.getElementById('Post_frequency').value)
            };

            try {
                // 3. POST to the configured backend API_URL
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Server status: ${response.status}`);
                }

                const data = await response.json();
                
                // 4. Reveal Animation
                resultText.textContent = `> ${data.prediction}`;
                resultContainer.classList.remove("hidden");
                setTimeout(() => {
                    resultContainer.classList.remove("opacity-0");
                }, 50);

            } catch (error) {
                resultText.textContent = `> [ERROR] Could not reach the backend. Check API_URL in index.html and ensure the server is running.`;
                resultText.classList.add("text-red-500");
                resultContainer.classList.remove("hidden");
                setTimeout(() => resultContainer.classList.remove("opacity-0"), 50);
                console.error(error);
            } finally {
                // 5. Restore button state
                submitBtn.disabled = false;
                submitBtn.textContent = "[ Execute Analysis ]";
                submitBtn.classList.remove("bg-neutral-800", "text-neutral-400");
                submitBtn.classList.add("bg-white", "text-black", "hover:bg-neutral-300");
            }
        });
    </script>
</body>
</html>
